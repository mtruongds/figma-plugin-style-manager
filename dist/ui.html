<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Styles Managers</title>
<style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── shadcn/ui Design Tokens ── */
  :root {
    /* Neutral scale (zinc) */
    --background: hsl(240 10% 3.9%);
    --foreground: hsl(0 0% 98%);
    --card: hsl(240 10% 3.9%);
    --card-foreground: hsl(0 0% 98%);
    --popover: hsl(240 10% 3.9%);
    --popover-foreground: hsl(0 0% 98%);
    --primary: hsl(0 0% 98%);
    --primary-foreground: hsl(240 5.9% 10%);
    --secondary: hsl(240 3.7% 15.9%);
    --secondary-foreground: hsl(0 0% 98%);
    --muted: hsl(240 3.7% 15.9%);
    --muted-foreground: hsl(240 5% 64.9%);
    --accent: hsl(240 3.7% 15.9%);
    --accent-foreground: hsl(0 0% 98%);
    --destructive: hsl(0 62.8% 30.6%);
    --destructive-foreground: hsl(0 0% 98%);
    --border: hsl(240 3.7% 15.9%);
    --input: hsl(240 3.7% 15.9%);
    --ring: hsl(240 4.9% 83.9%);
    --success: hsl(142 76% 36%);
    --success-foreground: hsl(0 0% 98%);
    --warning: hsl(48 96% 53%);
    --warning-foreground: hsl(0 0% 0%);

    /* Radius */
    --radius: 0.5rem;

    /* Font */
    --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", monospace;

    /* Sidebar-specific tokens */
    --sidebar: hsl(240 5.9% 10%);
    --sidebar-foreground: hsl(240 4.8% 95.9%);
    --sidebar-border: hsl(240 3.7% 15.9%);
    --sidebar-accent: hsl(240 3.7% 15.9%);
    --sidebar-accent-foreground: hsl(240 4.8% 95.9%);

    /* Animation */
    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans);
    font-size: 13px;
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Header (shadcn Sidebar Header pattern) ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--sidebar);
  }
  .header-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--sidebar-foreground);
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.01em;
  }
  .header-title svg { color: var(--muted-foreground); }

  /* ── Button styles (shadcn Button variants) ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: calc(var(--radius) - 2px);
    font-size: 13px;
    font-weight: 500;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: background var(--transition-fast), color var(--transition-fast),
                border-color var(--transition-fast), opacity var(--transition-fast),
                box-shadow var(--transition-fast);
    outline: none;
    white-space: nowrap;
    user-select: none;
  }
  .btn:focus-visible {
    outline: 2px solid var(--ring);
    outline-offset: 2px;
  }
  .btn:disabled {
    pointer-events: none;
    opacity: 0.5;
  }

  /* Default / Primary */
  .btn-primary {
    background: var(--primary);
    color: var(--primary-foreground);
    border: none;
    padding: 8px 16px;
    font-weight: 600;
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--primary);
    opacity: 0.9;
  }

  /* Secondary */
  .btn-secondary {
    background: var(--secondary);
    color: var(--secondary-foreground);
    border: 1px solid var(--border);
    padding: 8px 16px;
  }
  .btn-secondary:hover:not(:disabled) {
    background: hsl(240 3.7% 20%);
  }

  /* Ghost */
  .btn-ghost {
    background: transparent;
    color: var(--muted-foreground);
    border: none;
    padding: 6px;
  }
  .btn-ghost:hover {
    background: var(--accent);
    color: var(--accent-foreground);
  }

  /* Outline */
  .btn-outline {
    background: transparent;
    color: var(--foreground);
    border: 1px solid var(--input);
    padding: 8px 16px;
  }
  .btn-outline:hover:not(:disabled) {
    background: var(--accent);
    color: var(--accent-foreground);
  }

  /* Icon-only button */
  .btn-icon {
    width: 32px;
    height: 32px;
    padding: 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted-foreground);
    border-radius: calc(var(--radius) - 2px);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition-fast);
  }
  .btn-icon:hover {
    background: var(--accent);
    color: var(--accent-foreground);
    border-color: hsl(240 3.7% 20%);
  }
  .btn-icon.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Destructive ghost (for delete) */
  .btn-destructive-ghost {
    background: transparent;
    border: none;
    color: var(--muted-foreground);
    padding: 4px;
    border-radius: calc(var(--radius) - 2px);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    transition: all var(--transition-fast);
    opacity: 0;
    flex-shrink: 0;
  }
  .btn-destructive-ghost:hover {
    color: hsl(0 62.8% 50%);
    background: hsl(0 62.8% 30.6% / 0.15);
  }

  /* ── Input (shadcn Input) ── */
  .input {
    flex: 1;
    min-width: 0;
    background: var(--background);
    border: 1px solid var(--input);
    border-radius: calc(var(--radius) - 2px);
    color: var(--foreground);
    padding: 6px 10px;
    font-size: 13px;
    font-family: var(--font-sans);
    line-height: 1.5;
    outline: none;
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  }
  .input:focus {
    border-color: var(--ring);
    box-shadow: 0 0 0 2px hsl(240 4.9% 83.9% / 0.15);
  }
  .input::placeholder { color: var(--muted-foreground); }

  /* Search input with icon */
  .search-wrap {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }
  .search-wrap .search-icon {
    position: absolute;
    left: 26px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted-foreground);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--secondary);
    border: 1px solid var(--border);
    border-radius: calc(var(--radius) - 2px);
    color: var(--foreground);
    padding: 6px 10px 6px 32px;
    font-size: 13px;
    font-family: var(--font-sans);
    outline: none;
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  }
  .search-input:focus {
    border-color: var(--ring);
    box-shadow: 0 0 0 2px hsl(240 4.9% 83.9% / 0.15);
  }
  .search-input::placeholder { color: var(--muted-foreground); }

  /* ── ScrollArea (shadcn ScrollArea) ── */
  .list-container {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: hsl(240 3.7% 22%) transparent;
  }
  .list-container::-webkit-scrollbar { width: 6px; }
  .list-container::-webkit-scrollbar-track { background: transparent; }
  .list-container::-webkit-scrollbar-thumb {
    background: hsl(240 3.7% 22%);
    border-radius: 3px;
  }
  .list-container::-webkit-scrollbar-thumb:hover {
    background: hsl(240 3.7% 28%);
  }

  /* ── Empty state (shadcn Empty pattern) ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted-foreground);
    text-align: center;
    padding: 32px 24px;
  }
  .empty-state-icon {
    width: 48px;
    height: 48px;
    border-radius: var(--radius);
    background: var(--secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted-foreground);
  }
  .empty-state-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--foreground);
  }
  .empty-state-description {
    font-size: 12px;
    color: var(--muted-foreground);
    max-width: 200px;
    line-height: 1.5;
  }

  /* ── Label group headers ── */
  .label-group { margin-bottom: 2px; }
  .label-header {
    padding: 8px 16px 4px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted-foreground);
    position: sticky;
    top: 0;
    background: var(--background);
    z-index: 1;
  }

  /* ── Class item (shadcn Sidebar MenuItem pattern) ── */
  .class-item {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: calc(var(--radius) - 2px);
    margin: 1px 8px;
    transition: background var(--transition-fast);
    gap: 10px;
    position: relative;
  }
  .class-item:hover {
    background: var(--sidebar-accent);
  }
  .class-item:hover .btn-destructive-ghost { opacity: 1; }
  .class-item.selected {
    background: var(--sidebar-accent);
  }
  .class-item.selected::before {
    content: "";
    position: absolute;
    left: 0;
    top: 6px;
    bottom: 6px;
    width: 2px;
    background: var(--primary);
    border-radius: 0 2px 2px 0;
  }

  /* Class icon (Avatar-style) */
  .class-icon {
    width: 28px;
    height: 28px;
    border-radius: calc(var(--radius) - 2px);
    background: var(--secondary);
    border: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted-foreground);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.02em;
    font-family: var(--font-mono);
    transition: all var(--transition-fast);
  }
  .class-item.selected .class-icon {
    background: hsl(240 3.7% 20%);
    color: var(--foreground);
    border-color: hsl(240 3.7% 25%);
  }

  /* Class info */
  .class-info { flex: 1; min-width: 0; }
  .class-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .class-meta {
    font-size: 11px;
    color: var(--muted-foreground);
    margin-top: 1px;
    line-height: 1.3;
  }

  /* Badge (shadcn Badge variant=secondary) */
  .version-badge {
    font-size: 10px;
    font-weight: 500;
    background: var(--secondary);
    color: var(--muted-foreground);
    border: 1px solid var(--border);
    border-radius: 9999px;
    padding: 1px 7px;
    flex-shrink: 0;
    font-family: var(--font-mono);
    line-height: 1.4;
  }

  /* ── Footer / Insert bar ── */
  .insert-bar {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .insert-bar .btn-primary {
    width: 100%;
    border-radius: calc(var(--radius) - 2px);
  }

  /* ── Save section (Card pattern) ── */
  .save-section {
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    flex-shrink: 0;
    background: var(--sidebar);
  }
  .save-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--foreground);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  .form-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .field { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .field-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--foreground);
  }

  /* ── Selection indicator (Alert-like) ── */
  .selection-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: calc(var(--radius) - 2px);
    border: 1px solid var(--border);
    background: var(--background);
    margin-bottom: 10px;
    font-size: 12px;
  }
  .selection-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--muted-foreground);
    transition: background var(--transition-base), box-shadow var(--transition-base);
  }
  .selection-indicator.has-selection .selection-dot {
    background: var(--success);
    box-shadow: 0 0 6px hsl(142 76% 36% / 0.4);
  }
  .selection-indicator.has-selection {
    border-color: hsl(142 76% 36% / 0.3);
  }
  .selection-text {
    color: var(--muted-foreground);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .selection-indicator.has-selection .selection-text {
    color: hsl(142 76% 50%);
  }

  /* ── Separator ── */
  .separator {
    height: 1px;
    background: var(--border);
    margin: 8px 0;
    flex-shrink: 0;
  }

  /* ── Toast (shadcn Sonner-inspired) ── */
  .toast {
    position: fixed;
    bottom: 16px;
    left: 16px;
    right: 16px;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    z-index: 100;
    transform: translateY(calc(100% + 24px));
    transition: transform var(--transition-slow);
    pointer-events: none;
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 12px hsl(0 0% 0% / 0.3);
  }
  .toast.show { transform: translateY(0); }
  .toast.success {
    background: hsl(142 76% 36% / 0.12);
    border: 1px solid hsl(142 76% 36% / 0.3);
    color: hsl(142 76% 50%);
  }
  .toast.error {
    background: hsl(0 62.8% 30.6% / 0.12);
    border: 1px solid hsl(0 62.8% 30.6% / 0.3);
    color: hsl(0 62.8% 55%);
  }
  .toast-icon {
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  /* ── Keyboard shortcut hint ── */
  .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-family: var(--font-mono);
    background: var(--secondary);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0px 4px;
    color: var(--muted-foreground);
    line-height: 1.6;
  }

  /* ── Focus ring utility ── */
  :focus-visible {
    outline: 2px solid var(--ring);
    outline-offset: 2px;
  }

  /* ── Smooth transitions for interactions ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-title">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="1" width="6" height="6" rx="2" fill="currentColor"/>
      <rect x="9" y="1" width="6" height="6" rx="2" fill="currentColor" opacity=".4"/>
      <rect x="1" y="9" width="6" height="6" rx="2" fill="currentColor" opacity=".4"/>
      <rect x="9" y="9" width="6" height="6" rx="2" fill="currentColor" opacity=".4"/>
    </svg>
    Styles Managers
  </div>
  <div style="display: flex; gap: 4px;">
    <button class="btn btn-icon" id="exportBtn" title="Export Presets">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" x2="12" y1="15" y2="3"/>
      </svg>
    </button>
    <button class="btn btn-icon" id="importBtn" title="Import Presets">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" x2="12" y1="3" y2="15"/>
      </svg>
    </button>
    <input type="file" id="importInput" accept=".json" style="display: none;" />
  </div>
</div>

<!-- Search (Input with icon) -->
<div class="search-wrap">
  <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <circle cx="11" cy="11" r="8"/>
    <path d="m21 21-4.3-4.3"/>
  </svg>
  <input class="search-input" id="searchInput" type="text" placeholder="Search classes…" />
</div>

<!-- List (ScrollArea) -->
<div class="list-container" id="classList">
  <div class="empty-state" id="emptyState">
    <div class="empty-state-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <div class="empty-state-title">No classes yet</div>
    <div class="empty-state-description">Select a frame on canvas and save it as a reusable class below.</div>
  </div>
</div>

<!-- Insert bar -->
<div class="insert-bar">
  <button class="btn btn-primary" id="insertBtn" disabled>Insert Selected Class</button>
</div>

<!-- Save section -->
<div class="save-section">
  <div class="save-label">Save Selection as Class</div>

  <!-- Selection indicator -->
  <div class="selection-indicator" id="selectionIndicator">
    <div class="selection-dot"></div>
    <span class="selection-text" id="selectionText">No frame selected on canvas</span>
  </div>

  <div class="form-row">
    <div class="field">
      <label class="field-label" for="nameInput">Name</label>
      <input class="input" id="nameInput" type="text" placeholder="e.g. Container" />
    </div>
    <div class="field">
      <label class="field-label" for="labelInput">Label</label>
      <input class="input" id="labelInput" type="text" placeholder="e.g. Layout" />
    </div>
  </div>

  <button class="btn btn-outline" id="saveBtn" style="width: 100%;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14"/>
      <path d="M5 12h14"/>
    </svg>
    Save Class
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toastIcon"></span>
  <span id="toastMessage"></span>
</div>

<script>
  let allClasses = [];
  let selectedId = null;
  let hasValidSelection = false;

  // ── Messaging ──
  const post = (msg) => parent.postMessage({ pluginMessage: msg }, "*");

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === "classes-loaded") {
      allClasses = msg.classes || [];
      renderList(document.getElementById("searchInput").value.trim().toLowerCase());
    }
    if (msg.type === "selection-changed") {
      hasValidSelection = msg.hasValidSelection;
      const indicator = document.getElementById("selectionIndicator");
      const text = document.getElementById("selectionText");
      if (msg.hasValidSelection) {
        indicator.classList.add("has-selection");
        text.textContent = msg.nodeName || "Frame selected";
      } else {
        indicator.classList.remove("has-selection");
        text.textContent = "No frame selected on canvas";
      }
    }
    if (msg.type === "success") showToast(msg.message, "success");
    if (msg.type === "error") showToast(msg.message, "error");
  };

  // ── Render ──
  function renderList(filter = "") {
    const list = document.getElementById("classList");
    const empty = document.getElementById("emptyState");
    const insertBtn = document.getElementById("insertBtn");

    let items = allClasses;
    if (filter) {
      items = items.filter(
        (c) =>
          c.name.toLowerCase().includes(filter) ||
          (c.label || "").toLowerCase().includes(filter)
      );
    }

    if (items.length === 0) {
      list.innerHTML = "";
      list.appendChild(empty);
      insertBtn.disabled = true;
      return;
    }

    // Group by label
    const groups = {};
    for (const cls of items) {
      const key = cls.label || "Ungrouped";
      if (!groups[key]) groups[key] = [];
      groups[key].push(cls);
    }

    const sortedKeys = Object.keys(groups).sort((a, b) => {
      if (a === "Ungrouped") return 1;
      if (b === "Ungrouped") return -1;
      return a.localeCompare(b);
    });

    list.innerHTML = "";

    for (const key of sortedKeys) {
      const group = document.createElement("div");
      group.className = "label-group";

      const header = document.createElement("div");
      header.className = "label-header";
      header.textContent = key;
      group.appendChild(header);

      for (const cls of groups[key]) {
        group.appendChild(createClassItem(cls));
      }

      list.appendChild(group);
    }

    insertBtn.disabled = !selectedId || !allClasses.find((c) => c.id === selectedId);
  }

  function createClassItem(cls) {
    const item = document.createElement("div");
    item.className = "class-item" + (cls.id === selectedId ? " selected" : "");
    item.dataset.id = cls.id;

    const icon = document.createElement("div");
    icon.className = "class-icon";
    icon.textContent = cls.name.slice(0, 2).toUpperCase();

    const info = document.createElement("div");
    info.className = "class-info";

    const name = document.createElement("div");
    name.className = "class-name";
    name.textContent = cls.name;

    const meta = document.createElement("div");
    meta.className = "class-meta";
    const d = new Date(cls.updatedAt);
    meta.textContent = formatDate(d);

    info.appendChild(name);
    info.appendChild(meta);

    const badge = document.createElement("div");
    badge.className = "version-badge";
    badge.textContent = "v" + cls.version;

    const delBtn = document.createElement("button");
    delBtn.className = "btn-destructive-ghost";
    delBtn.title = "Delete class";
    delBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>`;
    delBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (confirm(`Delete class "${cls.name}"?`)) {
        post({ type: "delete-class", id: cls.id });
        if (selectedId === cls.id) {
          selectedId = null;
          document.getElementById("insertBtn").disabled = true;
        }
      }
    });

    item.appendChild(icon);
    item.appendChild(info);
    item.appendChild(badge);
    item.appendChild(delBtn);

    item.addEventListener("click", () => {
      selectedId = cls.id;
      document.getElementById("insertBtn").disabled = false;
      // Highlight
      document.querySelectorAll(".class-item").forEach((el) => el.classList.remove("selected"));
      item.classList.add("selected");
      // Pre-fill name for quick re-save
      document.getElementById("nameInput").value = cls.name;
      document.getElementById("labelInput").value = cls.label || "";
    });

    return item;
  }

  function formatDate(d) {
    const now = new Date();
    const diff = now - d;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return mins + "m ago";
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + "h ago";
    const days = Math.floor(hrs / 24);
    if (days < 7) return days + "d ago";
    return d.toLocaleDateString();
  }

  // ── Actions ──
  document.getElementById("insertBtn").addEventListener("click", () => {
    if (!selectedId) return;
    post({ type: "insert-class", id: selectedId });
  });

  document.getElementById("saveBtn").addEventListener("click", () => {
    const name = document.getElementById("nameInput").value.trim();
    const label = document.getElementById("labelInput").value.trim();
    if (!name) { showToast("Enter a class name.", "error"); return; }
    post({ type: "save-class", name, label });
  });

  document.getElementById("exportBtn").addEventListener("click", () => {
    if (allClasses.length === 0) {
      showToast("No classes to export.", "error");
      return;
    }
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allClasses, null, 2));
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", "class-manager-presets.json");
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
  });

  document.getElementById("importBtn").addEventListener("click", () => {
    document.getElementById("importInput").click();
  });

  document.getElementById("importInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const importedData = JSON.parse(event.target.result);
        if (!Array.isArray(importedData)) {
          throw new Error("Invalid preset format");
        }
        post({ type: "import-classes", classes: importedData });
      } catch (err) {
        showToast("Failed to parse JSON file.", "error");
      }
      e.target.value = ""; // reset input
    };
    reader.readAsText(file);
  });

  document.getElementById("searchInput").addEventListener("input", (e) => {
    renderList(e.target.value.trim().toLowerCase());
  });

  // ── Toast ──
  let toastTimer = null;
  function showToast(message, type = "success") {
    const toast = document.getElementById("toast");
    const toastMsg = document.getElementById("toastMessage");
    const toastIcon = document.getElementById("toastIcon");

    toastMsg.textContent = message;
    toast.className = "toast " + type;

    // Set icon
    if (type === "success") {
      toastIcon.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`;
    } else {
      toastIcon.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>`;
    }

    void toast.offsetWidth; // reflow
    toast.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 2800);
  }
</script>
</body>
</html>
